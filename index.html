<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="服务入口导航页" />
    <title>服务入口</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <canvas id="starCanvas" class="star-canvas" aria-hidden="true"></canvas>

    <header class="lab-banner" aria-label="欢迎来到808实验室">
      <canvas id="welcomeCanvas" class="pixel-canvas" width="1180" height="520"></canvas>
      <span class="sr-only">欢迎来到808实验室</span>
    </header>

    <main class="page-shell">
      <section class="hero" aria-label="服务列表">
        <div class="service-grid" aria-label="NAS 服务列表">
          <a class="service-link service-link--fnos" href="http://nas2.utlab.ltd:5666/" aria-label="飞牛 NAS">
            <span class="service-icon-circle" aria-hidden="true">
              <img class="service-icon-image" src="assets/images/fnos.png" alt="" />
            </span>
            <span class="sr-only">飞牛 NAS</span>
          </a>

          <a class="service-link service-link--overleaf" href="http://nas2.utlab.ltd/overleaf" aria-label="Overleaf">
            <span class="service-icon-circle" aria-hidden="true">
              <img class="service-icon-image" src="assets/images/overleaf.png" alt="" />
            </span>
            <span class="sr-only">Overleaf</span>
          </a>
        </div>
      </section>
    </main>

    <script src="assets/js/main.js"></script>
  </body>
</html>
